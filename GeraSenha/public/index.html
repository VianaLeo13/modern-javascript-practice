<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Gerador de senha</title>
</head>

<body>
  
  <section class="container">
    <h1>Gerador de senhas</h1>

   <div class="senha-gerada">Selecione as opções</div>

   Quantidade de Caracteres<input type="number" class="tamanho-senha" placeholder="" min="1" max="50"><br>
   Adicionar Letras Maiúsculas<input type="checkbox" class="chk-maiusculas"><br>
   Adicionar Letras Minúsculas<input type="checkbox" class="chk-minusculas"><br>
   Adicionar Números<input type="checkbox" class="chk-numeros"><br>
   Adicionar Símbolos<input type="checkbox" class="chk-simbolos"><br>

   <button class="btn-gerar">Gerar Senha</button>
  </section>

  <script src="./assets/js/bundle.js"></script>
</body>

</html>
